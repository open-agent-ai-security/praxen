name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify the tag matches PRAXEN_SPEC.md version
        run: |
          spec_version="$(grep -m1 -E '^\*\*Version:\*\*' PRAXEN_SPEC.md | sed -E 's/.*\*\*Version:\*\*[[:space:]]*//; s/[[:space:]]*$//')"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "PRAXEN_SPEC.md version: $spec_version ; tag: $tag_version"
          if [ "$spec_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match PRAXEN_SPEC.md version $spec_version"
            exit 1
          fi
      - name: Run the test suite
        run: python3 tests/render/test_render.py
      - name: Build the distributable zip
        run: bash build.sh
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/praxen-${version}.zip" \
            --title "Praxen $GITHUB_REF_NAME" \
            --generate-notes
      - name: Regenerate baseline coverage reports
        run: |
          python3 tests/baselines/owasp_coverage.py
          python3 tests/baselines/raise_coverage.py
      - name: Commit and push updated coverage reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/baselines/owasp-coverage-report.html \
                  tests/baselines/raise-coverage-report.html
          # Only commit if either file changed (a fresh tag on an unchanged
          # baseline set produces identical HTML, so skip the no-op commit).
          git diff --cached --quiet || \
            git commit -m "chore: regenerate coverage reports for $GITHUB_REF_NAME [skip ci]"
          git push origin HEAD:main
