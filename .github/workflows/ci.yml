name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the floor (declared in PRAXEN_SPEC.md §2.6 / docs/installation.md —
        # it's the system Python on current macOS Command Line Tools); 3.12 and
        # 3.13 cover current releases. The pipeline is stdlib-only, no pip install.
        python-version: ["3.9", "3.12", "3.13"]
    name: test (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Render pipeline tests (schema + render + golden files)
        run: python3 tests/render/test_render.py
      - name: Manifest→findings converter tests (Step 9.9 → Step 10)
        run: python3 tests/render/test_manifest_to_findings.py
      - name: Plugin manifest structure (marketplace + claude + codex)
        run: python3 tests/render/test_plugin_manifests.py
      - name: Package the distributable (sanity)
        run: bash build.sh
